<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Patients</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="container-box">

        <h2>🏥 Manage Patients</h2>

        <div class="form-section">
            <h3>Add New Patient</h3>

            <div class="form-row">
                <input type="text" id="pname" placeholder="Patient Name">
                <input type="number" id="age" placeholder="Age">
            </div>

            <div class="form-row">
                <input type="text" id="gender" placeholder="Gender">
                <input type="text" id="disease" placeholder="Disease">
            </div>

            <button type="button" onclick="addPatient()">+ Add Patient</button>
        </div>

        <h3>👥 Patient List</h3>
        <div class="card-list" id="patientList"></div>

        <a href="index.html">← Back</a>

        <!-- Modal overlay (used for patient details / edit) -->
        <div class="modal-overlay" id="modalOverlayPatients">
            <div class="modal" id="modalContentPatients"></div>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
