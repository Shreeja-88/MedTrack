<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients | MedTrack</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-wrapper">
            <div id="topbar-container"></div>

            <div class="page-container" id="page-content">
                <div class="page">
                    <div class="page-header">
                        <div>
                            <h1>Patient Records</h1>
                            <p>Manage patient demographics and track their assigned medicine dosages and recheck dates.
                            </p>
                        </div>
                        <div>
                            <button class="btn btn-primary btn-glow" onclick="openPatientPanel()"><i
                                    data-lucide="user-plus"></i> Register Patient</button>
                        </div>
                    </div>

                    <div class="slide-panel hidden" id="add-patient-panel">
                        <div class="panel-body">
                            <h3 id="patient-panel-title">Register Patient</h3>
                            <input type="hidden" id="p_id" value="">
                            <div class="form-grid">
                                <div class="form-group"><label>Full Name *</label><input type="text" id="p_name"></div>
                                <div class="form-group"><label>Age *</label><input type="number" id="p_age"></div>
                                <div class="form-group"><label>Gender *</label>
                                    <select id="p_gender">
                                        <option>Male</option>
                                        <option>Female</option>
                                        <option>Other</option>
                                    </select>
                                </div>
                                <div class="form-group"><label>Condition / Disease *</label><input type="text"
                                        id="p_disease"></div>
                                <div class="form-group"><label>Next Recheck Date</label><input type="date"
                                        id="p_recheck"></div>
                            </div>
                            <div class="form-actions right">
                                <button class="btn btn-outline" onclick="closePatientPanel()">Cancel</button>
                                <button class="btn btn-primary" onclick="submitPatient()">Save Patient</button>
                            </div>
                        </div>
                    </div>

                    <div class="filter-toolbar" style="margin-bottom: 24px;">
                        <div class="search-box">
                            <i data-lucide="search"></i>
                            <input type="text" id="search-input" placeholder="Search by name or condition...">
                        </div>
                    </div>

                    <div class="grid-cards" id="patient-cards">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/js/patients.js"></script>
    <script>
        window.openPatientPanel = () => { };
        window.closePatientPanel = () => { };
        window.editPatient = () => { };
        window.submitPatient = () => { };
        window.deletePatient = () => { };
    </script>
</body>

</html>
