<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTrack Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="container-box">
        <h2>MedTrack Dashboard</h2>
        <p style="text-align: center; color: #666; margin-bottom: 40px; font-size: 1.1em;">Healthcare Management System</p>
        
        <div class="card-list">
            <div class="card">
                <div class="card-title">💊 Manage Medicines</div>
                <div class="card-info">Add, edit, delete medicines and manage inventory stock levels</div>
                <div class="card-actions">
                    <a href="medicines.html" style="display: inline-block; width: 100%; text-align: center; margin-top: 15px; padding: 12px 25px;">Go to Medicines</a>
                </div>
            </div>

            <div class="card">
                <div class="card-title">🏥 Manage Patients</div>
                <div class="card-info">Add, edit, delete patient records and assign medicines</div>
                <div class="card-actions">
                    <a href="patients.html" style="display: inline-block; width: 100%; text-align: center; margin-top: 15px; padding: 12px 25px;">Go to Patients</a>
                </div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 40px; color: #999; font-size: 0.9em;">
            <p>© 2026 MedTrack - Medical Inventory Management System</p>
        </div>
    </div>
</div>
</body>
</html>
